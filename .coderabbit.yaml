# CodeRabbit configuration for Blackbird plugins
# Universal config — works across all Apps.* plugin repositories
# Docs: https://docs.coderabbit.ai/reference/configuration

language: "en-US"

reviews:
  profile: "chill"
  request_changes_workflow: false  # Don't block PRs with change requests — leave comments instead
  high_level_summary: false        # Don't modify the PR description — just leave comments
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false

  # Global instructions
  instructions: |
    This repository is a **Blackbird.io plugin** built on .NET 8+ using the Blackbird
    Applications SDK. Plugins are deployed to the Blackbird service and versioned via
    the <Version> tag in the .csproj file.
  
    ## Version bump check
    Check whether the `<Version>` in any `*.csproj` has been incremented vs the base
    branch. If unchanged, leave a comment: "⚠️ **Version not bumped.** Without a
    version bump the plugin will NOT be accepted by the Blackbird deployment service."
  
    ## Documentation sync check
    The user never sees method or class names — they only see the text inside attributes:
    `[Action("Display name")]`, `[Display("Label")]`, `[ActionList("Group name")]`, etc.
    When those attribute values are added, removed, or changed, check whether README.md
    reflects the update. Leave a non-blocking suggestion if it doesn't.
  
    ## Blackbird SDK conventions
    - All I/O must be async — no blocking `.Result` or `.Wait()` calls.
    - Errors must use `PluginApplicationException` or `PluginMisconfigurationException`.

  # Path based instructions
  path_instructions:

    - path: "**/*.csproj"
      instructions: |
        Check that the `<Version>` element has been incremented relative to the base
        branch. If unchanged, leave a warning comment — the plugin won't deploy without
        a version bump. Also verify that NuGet package versions are pinned explicitly
        (no floating ranges like `1.*`).

    - path: "**/Actions/**"
      instructions: |
        Blackbird action classes. Review for:
        1. Every public action method has `[Action]` with a display name and description.
        2. Action input models: user-facing properties carry `[Display]` attributes.
        3. Error handling uses `PluginApplicationException` where appropriate.
        4. No blocking sync calls — all I/O must be async/await.
        5. If a new action is added or removed, suggest updating README.md (non-blocking).

    - path: "**/DataSourceHandlers/**"
      instructions: |
        Dynamic dropdown handlers for the Blackbird UI. Verify:
        1. The class implements the correct `IAsyncDataSourceItemHandler` or `IDataSourceItemHandler` or `IStaticDataSourceItemHandler` interfaces.
        2. Pagination is handled if the upstream API paginates results.

    - path: "**/Connections/**"
      instructions: |
        Connection and authentication code. Check, but note not all apps has OAuth type of authentication, some have API keys or other types of credentials, so the checks should be adapted accordingly:
        1. Credentials are never logged or serialised to plain strings.
        2. OAuth token refresh logic is present and covered (if OAuth is used).
        3. `ConnectionValidator` returns a user-friendly error message on failure.

    - path: "**/Api/**"
      instructions: |
        REST client wrappers. Check:
        1. HTTP calls use the injected client, not ad-hoc `HttpClient` instances.
        2. Error handling is robust — non-success status codes should throw exceptions with helpful and user-friendly messages, wrapped in `PluginApplicationException` (for system related issues) or `PluginMisconfigurationException` (for user configuration related issues, like empty incoming ID).

    - path: "README.md"
      instructions: |
        This is the public user-facing documentation published on Blackbird's marketplace. Check the following structure is present and up to date:
        1. **Connection section** — there must be a section explaining how to set up a
        connection (credentials, OAuth steps, required fields). It should match the
        fields defined in `ConnectionDefinition`. If new fields were added or removed,
        flag it.
        2. **Actions section** — there must be a section listing available actions. Check
        that every action mentioned in README exists in the `Actions/` folder and that
        no actions present in the code are missing from the docs. If actions were
        added, removed, or renamed in this PR, flag any mismatch.
        3. **Events/Triggers section** — if the codebase contains any polling triggers or
        webhooks (look for classes implementing polling or webhook interfaces in the
        repository), there must be a corresponding section in README describing them.
        If no triggers exist in the code, this section is not required — do not flag
        its absence.
        
        Language must be clear and suitable for non-developer end users. Do not request changes for documentation issues — leave non-blocking suggestions only.

    - path: "**/Tests*/**"
      instructions: |
        Tests. Confirm:
        1. No real credentials are hardcoded — use environment variables or a secrets
           manager.

chat:
  auto_reply: true